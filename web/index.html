<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenchmarkTool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { color: #333; }
        #benchmarkData {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #f9f9f9;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <h1>BenchmarkTool</h1>
    <p>Loading benchmark data...</p>
    <div id="benchmarkData">
        <!-- Benchmark data will be loaded here -->
    </div>

    <script>
        fetch('/benchmarks')
            .then(response => response.json())
            .then(data => {
                document.getElementById('benchmarkData').textContent = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById('benchmarkData').textContent = 'Error loading benchmark data: ' + error;
            });
    </script>
</body>
</html>
